services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: pecuaria
      POSTGRES_USER: pecuaria
      POSTGRES_PASSWORD: pecuaria_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

volumes:
  postgres_data:
